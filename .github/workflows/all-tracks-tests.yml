name: All Tracks Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pytest cryptography
      - name: HW-1 tests
        run: cd hw-track-1-sensors && python -m pytest tests/ -q
      - name: HW-2 tests
        run: cd hw-track-2-security-boot && python -m pytest tests/ -q
      - name: HW-3 tests
        run: cd hw-track-3-connectivity && python -m pytest tests/ -q
      - name: Day 5 integration tests
        run: python -m pytest integration/test_day5_integration.py -q
      - name: End-to-end pipeline
        run: cd hw-track-3-connectivity && python e2e_pipeline.py
