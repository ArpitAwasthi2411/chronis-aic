name: HW-1 Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run HW-1 test suite
        run: |
          cd hw-track-1-sensors
          python -m pytest tests/ -v

      - name: Generate traces (smoke test)
        run: |
          cd hw-track-1-sensors/traces
          python trace_generator.py

      - name: Run extended simulation (smoke test)
        run: |
          cd hw-track-1-sensors
          python state_machine/extended_run.py
